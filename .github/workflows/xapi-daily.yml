name: X API daily collection

on:
  workflow_dispatch:
    inputs:
      full_backfill:
        description: "Run the full historical collection when no cached progress exists"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      auto_triage:
        description: "Trigger one automatic triage scan after D1 import"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
  schedule:
    - cron: "10 21 * * *"

concurrency:
  group: xapi-daily-collection
  cancel-in-progress: false

jobs:
  collect-and-import:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      GETXAPI_KEY: ${{ secrets.GETXAPI_KEY }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      WORKER_ADMIN_TOKEN: ${{ secrets.WORKER_ADMIN_TOKEN }}
      PHASE1_STORE_PATH: automation/xapi-data/local-store.json
      WORKER_AUTO_TRIAGE_URL: https://investment-os-v9-phase1.eolala940.workers.dev/telegram/auto-triage

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Restore X API working data
        uses: actions/cache@v4
        with:
          path: automation/xapi-data
          key: xapi-data-${{ github.run_id }}
          restore-keys: |
            xapi-data-

      - name: Install dependencies
        run: |
          npm install --no-save --package-lock=false --no-audit --no-fund --omit=optional --omit=peer tsx@4.19.4 typescript@5.8.3 pg@8.20.0 wrangler@4.99.0
          python -m pip install --upgrade pip
          python -m pip install -r scripts/xapi/requirements.txt

      - name: Prepare working directory
        run: |
          mkdir -p automation/xapi-data
          cp scripts/xapi/*.py automation/xapi-data/

      - name: Decide collection mode
        id: collection-mode
        run: |
          if [ -f automation/xapi-data/progress.json ]; then
            echo "run_pipeline=true" >> "$GITHUB_OUTPUT"
            echo "Cached progress found. Running incremental collection."
            exit 0
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.full_backfill }}" = "true" ]; then
            echo "run_pipeline=true" >> "$GITHUB_OUTPUT"
            echo "Full backfill explicitly requested."
            exit 0
          fi

          python automation/xapi-data/seed_progress.py
          echo "run_pipeline=true" >> "$GITHUB_OUTPUT"
          echo "No cached progress found. Seeded safe incremental progress instead of running a full backfill."

      - name: Run X API collection pipeline
        if: ${{ steps.collection-mode.outputs.run_pipeline == 'true' }}
        working-directory: automation/xapi-data
        run: |
          python collect.py
          python enrich.py
          python fix_not_found.py
          python rebuild_trees.py

      - name: Import prepared contexts into local store
        if: ${{ steps.collection-mode.outputs.run_pipeline == 'true' }}
        run: |
          PHASE1_STORE_PATH=automation/xapi-data/local-store.json npm run phase1 -- ingest:historical --source xapi --file automation/xapi-data/context_units.json --context-trees automation/xapi-data/context_trees.json --raw-posts-enriched automation/xapi-data/raw_posts_enriched.json --persist

      - name: Export local store to D1 SQL
        if: ${{ steps.collection-mode.outputs.run_pipeline == 'true' }}
        run: |
          node scripts/export-local-store-to-d1-sql.mjs automation/xapi-data/local-store.json automation/xapi-data/d1-import.sql

      - name: Import into Cloudflare D1
        if: ${{ steps.collection-mode.outputs.run_pipeline == 'true' }}
        run: |
          npx wrangler d1 execute investment-os-v9-phase1 --remote --file automation/xapi-data/d1-import.sql

      - name: Trigger one automatic triage scan
        if: ${{ steps.collection-mode.outputs.run_pipeline == 'true' && (github.event_name == 'schedule' || inputs.auto_triage == 'true') }}
        run: |
          curl -fsS -X POST "$WORKER_AUTO_TRIAGE_URL" \
            -H "content-type: application/json" \
            -H "x-admin-token: $WORKER_ADMIN_TOKEN" \
            --data '{"limit":10}'

      - name: Upload X API working data backup
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xapi-working-data-${{ github.run_id }}
          path: automation/xapi-data
          retention-days: 14
